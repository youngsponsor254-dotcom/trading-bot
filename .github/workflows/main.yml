name: Trading Bot

on:
  schedule:
    - cron: '0 * * * *' # This runs the bot at the start of every hour
  workflow_dispatch:     # This lets you run it manually whenever you want

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests yfinance pandas

      - name: Run bot
        run: python bot.py
